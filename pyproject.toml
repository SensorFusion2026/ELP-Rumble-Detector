[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "elp-rumble"
version = "0.1.0"
dependencies = [
  "python-dotenv",
  "numpy",
  "pandas",
  "scipy",
  "scikit-learn",
  "tensorflow",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]